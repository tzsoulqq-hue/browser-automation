syntax = "proto3";

package byte.v.forge.browserautomation.internal.v1;

import "byte/v/forge/contracts/browserautomation/v1/browser_automation.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

option csharp_namespace = "ByteVForge.BrowserAutomation.Internal.V1";
option go_package = "github.com/byte-v-forge/browser-automation/gen/go/byte/v/forge/browserautomation/internal/v1;browserautomationinternalv1";
option java_multiple_files = true;
option java_outer_classname = "BrowserAutomationInternalProto";
option java_package = "com.bytevforge.browserautomation.internal.v1";
option php_namespace = "ByteVForge\\BrowserAutomation\\Internal\\V1";

service BrowserRuntimeAdminService {
  rpc UpsertRuntimeConfig(UpsertRuntimeConfigRequest) returns (UpsertRuntimeConfigResponse);
  rpc GetRuntimeConfig(GetRuntimeConfigRequest) returns (GetRuntimeConfigResponse);
  rpc UpsertInternalSession(UpsertInternalSessionRequest) returns (UpsertInternalSessionResponse);
  rpc GetInternalSession(GetInternalSessionRequest) returns (GetInternalSessionResponse);
  rpc UpsertInternalTask(UpsertInternalTaskRequest) returns (UpsertInternalTaskResponse);
  rpc GetInternalTask(GetInternalTaskRequest) returns (GetInternalTaskResponse);
}

enum BrowserRuntimeKind {
  BROWSER_RUNTIME_KIND_UNSPECIFIED = 0;
  BROWSER_RUNTIME_KIND_PLAYWRIGHT = 1;
  BROWSER_RUNTIME_KIND_CHROME_DEVTOOLS_PROTOCOL = 2;
  BROWSER_RUNTIME_KIND_REMOTE_BROWSER = 3;
  BROWSER_RUNTIME_KIND_CAMOUFOX_SIDECAR = 4;
}

message BrowserRuntimeConfig {
  string runtime_config_id = 1;
  BrowserRuntimeKind kind = 2;
  bool enabled = 3;
  string endpoint = 4;
  string credential_secret_ref = 5;
  string artifact_bucket_ref = 6;
  repeated byte.v.forge.contracts.browserautomation.v1.BrowserKind supported_browsers = 7;
  map<string, string> labels = 20;
  google.protobuf.Timestamp created_at = 30;
  google.protobuf.Timestamp updated_at = 31;
}

message RuntimeSessionRef {
  string runtime_config_id = 1;
  string upstream_session_id = 2;
  string browser_context_id = 3;
  string page_id = 4;
}

message RuntimeTaskRef {
  string runtime_config_id = 1;
  string upstream_task_id = 2;
}

message InternalBrowserSession {
  byte.v.forge.contracts.browserautomation.v1.BrowserSession public_session = 1;
  RuntimeSessionRef runtime_ref = 2;
  google.protobuf.Struct raw_metadata = 20;
}

message InternalBrowserTask {
  byte.v.forge.contracts.browserautomation.v1.BrowserTask public_task = 1;
  RuntimeTaskRef runtime_ref = 2;
  google.protobuf.Struct raw_metadata = 20;
}

message UpsertRuntimeConfigRequest {
  BrowserRuntimeConfig config = 1;
}

message UpsertRuntimeConfigResponse {
  BrowserRuntimeConfig config = 1;
  byte.v.forge.contracts.browserautomation.v1.BrowserAutomationError error = 2;
}

message GetRuntimeConfigRequest {
  string runtime_config_id = 1;
}

message GetRuntimeConfigResponse {
  BrowserRuntimeConfig config = 1;
  byte.v.forge.contracts.browserautomation.v1.BrowserAutomationError error = 2;
}

message UpsertInternalSessionRequest {
  InternalBrowserSession session = 1;
}

message UpsertInternalSessionResponse {
  InternalBrowserSession session = 1;
  byte.v.forge.contracts.browserautomation.v1.BrowserAutomationError error = 2;
}

message GetInternalSessionRequest {
  string session_id = 1;
}

message GetInternalSessionResponse {
  InternalBrowserSession session = 1;
  byte.v.forge.contracts.browserautomation.v1.BrowserAutomationError error = 2;
}

message UpsertInternalTaskRequest {
  InternalBrowserTask task = 1;
}

message UpsertInternalTaskResponse {
  InternalBrowserTask task = 1;
  byte.v.forge.contracts.browserautomation.v1.BrowserAutomationError error = 2;
}

message GetInternalTaskRequest {
  string task_id = 1;
}

message GetInternalTaskResponse {
  InternalBrowserTask task = 1;
  byte.v.forge.contracts.browserautomation.v1.BrowserAutomationError error = 2;
}
